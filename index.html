<style>
  :root{--bg:#f6f3ea;--panel:#fffdf8;--ink:#22201b;--muted:#6b6459;--line:#e5ddcb;
    --green:#0c5c48;--green2:#0a4a3a;--gold:#a67c2e;--red:#a3341f;--chip:#efe9d8;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:"Segoe UI",system-ui,-apple-system,Arial,sans-serif;font-size:15px}
  .ar{font-family:"Traditional Arabic","Amiri","Scheherazade New","Sakkal Majalla",serif;direction:rtl;line-height:1.9}
  header{background:var(--green);color:#fff;padding:12px 18px;display:flex;gap:16px;align-items:center;
    position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.12)}
  header h1{font-size:17px;margin:0;font-weight:600;white-space:nowrap}
  header .sub{font-size:11px;opacity:.8;margin-top:2px}
  #search{flex:1;max-width:520px;margin-left:auto;padding:9px 14px;border:none;border-radius:22px;
    font-size:14px;background:rgba(255,255,255,.16);color:#fff;outline:none}
  #search::placeholder{color:rgba(255,255,255,.7)}
  #status{font-size:12px;padding:4px 12px;border-radius:14px;white-space:nowrap;font-weight:600}
  .hbtn{background:rgba(255,255,255,.16);color:#fff;border:none;border-radius:16px;padding:7px 15px;cursor:pointer;font-size:13px;white-space:nowrap;font-weight:500}
  .hbtn:hover{background:rgba(255,255,255,.28)}
  #status.load{background:#e9e2cf;color:#6b6459}
  #status.online{background:#dff0e6;color:#0c5c48;padding:4px 9px;font-size:13px}
  #status.offline{background:#fbe7b0;color:#8a5a12}
  #status.err{background:#f6d7cf;color:#a3341f}
  .adminbadge{background:var(--gold);color:#fff;font-size:11px;padding:2px 9px;border-radius:12px;font-weight:600}
  .wrap{display:flex;height:calc(100vh - 56px)}
  #sidebar{width:250px;border-right:1px solid var(--line);background:var(--panel);display:flex;flex-direction:column}
  .sb-head{flex:0 0 auto;border-bottom:2px solid var(--line);box-shadow:0 3px 6px rgba(0,0,0,.05);position:relative;z-index:2}
  .sb-list{flex:1 1 auto;overflow:auto;min-height:0}
  .esma-verse{padding:14px 2px;border-bottom:1px solid var(--line);cursor:pointer}
  .esma-verse:hover{background:rgba(12,92,72,.035)}
  .esma-verse .ar{font-size:23px;text-align:right;line-height:2;margin-bottom:8px}
  .ev-ref{font-size:12px;color:var(--muted);margin-bottom:4px}
  .ev-meal{font-size:15px;color:var(--ink);line-height:1.65}
  #main{flex:1;min-width:0;min-height:0;overflow:auto;padding:22px 26px}
  #main.lockmode{overflow:hidden;padding:0;display:flex;flex-direction:column}
  .locktop{flex:0 0 auto;padding:14px 26px 8px;background:var(--bg);border-bottom:1px solid var(--line);box-shadow:0 3px 8px rgba(0,0,0,.05);z-index:2;max-height:54vh;overflow:auto}
  .locktop .maincard{margin-bottom:8px}
  .locktop .sectitle{margin:10px 0 4px}
  .scrollbody{flex:1 1 auto;overflow:auto;min-height:0;padding:16px 26px}
  .esma-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(152px,1fr));gap:10px;margin-top:10px}
  .esma-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:border-color .12s,box-shadow .12s}
  .esma-card:hover{border-color:var(--green);box-shadow:0 2px 10px rgba(12,92,72,.12)}
  .esma-ad{font-weight:600;color:var(--green2);font-size:16px}
  .esma-say{font-size:12px;color:var(--muted);background:var(--chip);border-radius:12px;padding:2px 9px;flex:0 0 auto}
  .esma-clead{display:flex;flex-direction:column;gap:1px;min-width:0}
  .esma-ar{font-family:"Traditional Arabic","Amiri","Scheherazade New","Sakkal Majalla",serif;direction:rtl;color:var(--gold);font-size:20px;line-height:1.25}
  .esma-ar-big{font-family:"Traditional Arabic","Amiri","Scheherazade New","Sakkal Majalla",serif;direction:rtl;color:var(--gold);font-size:30px}
  .ar b.esmahl{color:#8a1a0a;background:#f6e2c4;border-radius:3px;padding:0 3px;font-weight:700}
  .esma-head{display:flex;align-items:baseline;gap:14px;margin-top:4px}
  .esma-baslik{font-size:27px;font-weight:700;color:var(--green)}
  .esma-say2{font-size:14px;color:var(--muted)}
  .esmatop{background:#efe9d8!important;font-weight:600;color:var(--gold)}
  .surehead{background:#eaf1ea!important;font-weight:600;color:var(--green2)}
  .esma-side{gap:10px}
  .esma-side-ar{font-family:"Traditional Arabic","Amiri","Scheherazade New","Sakkal Majalla",serif;color:var(--gold);font-size:18px;direction:rtl;flex:0 0 auto}
  .esma-side-tr{flex:1;font-weight:600;color:var(--green2)}
  .esma-side.active .esma-side-ar,.esma-side.active .esma-side-tr{color:#fff}
  .tekdestek{margin-top:26px;padding-top:12px;border-top:1px solid var(--line);color:var(--muted);font-size:12px}
  .social-follow{margin-top:22px;text-align:center}
  .social-follow .sf-label{color:var(--muted);font-size:13px;margin-bottom:10px}
  .social-follow a{display:inline-block;margin:0 10px;color:#0c5c48;transition:transform .15s ease,color .15s ease;vertical-align:middle}
  .social-follow a:hover{transform:scale(1.18)}
  .social-follow a.sf-x:hover{color:#000}
  .social-follow a.sf-ig:hover{color:#E1306C}
  .social-follow svg{width:27px;height:27px;display:block}
  .filigran{margin-top:40px;text-align:center;color:#c9c1b0;font-size:12px;letter-spacing:1px;opacity:.6;font-style:italic}
  .sure-item{padding:9px 16px;cursor:pointer;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .sure-item:hover{background:var(--chip)}
  .sure-item.active{background:var(--green);color:#fff}
  .sure-no{font-size:12px;color:var(--muted);min-width:26px}
  .sure-item.active .sure-no{color:rgba(255,255,255,.75)}
  .sure-name{flex:1;margin:0 8px;font-weight:500}
  .sure-cnt{font-size:11px;color:var(--muted)}
  .sure-item.active .sure-cnt{color:rgba(255,255,255,.75)}
  .crumb{color:var(--muted);font-size:13px;margin-bottom:4px}
  .sureread{margin-top:6px}
  .ayetsec{display:flex;align-items:center}
  .ayetsec input{width:56px;padding:3px 8px;border:none;border-radius:12px;text-align:center;

<script>
// ===== YAPILANDIRMA =====
const DATA_URL = "https://raw.githubusercontent.com/Musmur0606/konkordans-veri/refs/heads/main/app_data.json";
const ABOUT_URL = "https://raw.githubusercontent.com/Musmur0606/konkordans-veri/refs/heads/main/hakkinda.md";
const SITE_SURUM = '1.7.1';   // 18.07.2026 · cep duzeni
const ADMIN = false;      // true = admin (düzenleme açık), false = kullanıcı (salt-okunur)
const TRK = {"ربب": ["Rab", "rabb"], "رحم": ["rahmet", "merhamet", "esirge", "Rahman", "Rahim", "acı"], "امن": ["iman", "inan", "mü’min", "mümin", "güven", "emin"], "علم": ["ilim", "bil", "âlim", "alim", "bilgi", "öğren"], "هدي": ["hidayet", "doğru yol", "ilet", "yol göster", "kılavuz"], "كفر": ["kâfir", "kafir", "inkâr", "inkar", "küfr", "nankör", "ört"], "خلق": ["yarat", "halk", "yaratıl"], "عبد": ["kul", "ibadet", "tap", "kulluk"], "رسل": ["elçi", "resul", "peygamber", "gönder"], "نعم": ["nimet"], "ضلل": ["sap", "dalâlet", "dalalet", "şaşır"], "ملك": ["mülk", "hükümran", "melik", "sahib", "hüküm"], "يوم": ["gün"], "دين": ["din", "ceza", "hesap"], "عمل": ["amel", "iş", "yap", "çalış"], "صلح": ["sâlih", "salih", "iyi", "ıslah", "düzelt", "barış"], "ذنب": ["günah", "suç"], "عذب": ["azap", "azab", "işkence"], "جنن": ["cennet", "bahçe"], "نار": ["ateş", "cehennem"], "حقق": ["hak", "gerçek", "doğru"], "صبر": ["sabır", "sabret", "dayan", "katlan"], "شكر": ["şükür", "şükret", "teşekkür"], "رزق": ["rızık", "rızk", "geçim", "nasip"], "دعو": ["dua", "çağır", "davet", "yalvar"], "غفر": ["bağışla", "mağfiret", "affet", "affe"], "سمو": ["gök", "sema", "semâ"], "ارض": ["yer", "yeryüzü", "arz", "toprak"], "نفس": ["nefs", "kendi", "can"], "قلب": ["kalp", "gönül", "yürek"], "ايه": ["âyet", "ayet", "delil", "işaret", "mucize"], "كتب": ["kitap", "yaz", "yazı"], "حكم": ["hüküm", "hikmet", "hakem", "karar"], "قوم": ["kavim", "millet", "topluluk", "kalk", "ayakta"], "ولد": ["çocuk", "oğul", "doğur", "evlat"], "موت": ["ölüm", "öl", "ölü"], "حيي": ["diri", "hayat", "yaşa", "can"], "نور": ["nur", "ışık", "aydınlık"], "ظلم": ["zulüm", "zalim", "haksız", "karanlık"], "صدق": ["doğru", "sadık", "tasdik", "dürüst"], "وحد": ["bir", "tek", "birlik"], "شرك": ["ortak", "şirk", "eş koş", "müşrik"], "تقو": ["takva", "sakın", "korun", "muttaki"], "فسق": ["fâsık", "fasık", "fısk", "yoldan çık"], "نبا": ["haber", "nebi", "peygamber"], "سبح": ["tesbih", "yücelt", "noksanlık"], "حمد": ["hamd", "övgü", "över"], "عظم": ["büyük", "yüce", "azîm", "ulu"], "خشي": ["kork", "haşyet", "çekin"], "رجع": ["dön", "rücû", "geri"], "بصر": ["gör", "basiret", "göz"], "سمع": ["işit", "duy", "dinle"], "فوز": ["kurtuluş", "başarı", "felah", "murad"], "خسر": ["hüsran", "ziyan", "kayıp", "zarar", "aldan"], "صمد": ["samed", "müstağni", "muhtaç"], "كفا": ["denk", "eş", "benzer", "küfüv"], "ندد": ["eş", "rakip", "benzer", "put"], "مثل": ["benzer", "misal", "örnek", "gibi"], "انس": ["insan", "kişi", "insanoğlu"], "عصر": ["zaman", "çağ", "ikindi", "asır"], "وصي": ["tavsiye", "öğüt", "vasiyet", "emret"]};
const ESMA_URL = "https://raw.githubusercontent.com/Musmur0606/konkordans-veri/refs/heads/main/esma_index.json";
let ESMA = {esmalar:[],index:{}};
// ========================

let DB=null, V=null, S=null, curSure=null, curRef=null, mealMode='mb';
let HIST=[], HPTR=-1;
const el=(h)=>{const d=document.createElement('div');d.innerHTML=h;return d.firstElementChild;};
const gr=(r)=>String(r).replace(':','.');   // GORUNUM: 2:42 -> 2.42  (veri anahtarlari ':' kalir)
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

// ---- IndexedDB (6 MB önbellek) ----
function idb(mode,fn){return new Promise((res,rej)=>{const r=indexedDB.open('konkDB',1);
  r.onupgradeneeded=()=>{if(!r.result.objectStoreNames.contains('kv'))r.result.createObjectStore('kv');};
  r.onsuccess=()=>{const db=r.result;const st=db.transaction('kv',mode).objectStore('kv');fn(st,res,rej);};
  r.onerror=()=>rej(r.error);});}
function idbGet(k){return idb('readonly',(st,res,rej)=>{const q=st.get(k);q.onsuccess=()=>res(q.result);q.onerror=()=>rej(q.error);});}
function idbSet(k,v){return idb('readwrite',(st,res,rej)=>{const q=st.put(v,k);q.onsuccess=()=>res();q.onerror=()=>rej(q.error);});}

function setStatus(cls,txt,ip){const s=document.getElementById('status');s.className=cls;s.textContent=txt;s.title=(ip===undefined?txt:ip);}
function fmtDate(iso){try{return new Date(iso).toLocaleString('tr-TR');}catch(e){return iso;}}

// ---- Açılış: GitHub'dan çek, olmazsa önbellekten ----
async function boot(){
  if(ADMIN) document.getElementById('abadge').innerHTML='<span class="adminbadge">ADMIN</span>';
  setStatus('load','yükleniyor…');
  let loaded=false, offline=false, when=null;
  // Admin: yerel çalışma kopyası varsa önce onu kullan (kaydedilmemiş düzenlemeler kaybolmasın)
  if(ADMIN){ try{const wc=await idbGet('workingcopy'); if(wc){DB=JSON.parse(wc); loaded=true; when=await idbGet('wc_time'); setStatus('offline','yerel çalışma kopyası · '+(when?fmtDate(when):''));}}catch(e){} }
  if(!loaded){
    try{
      const resp=await fetch(DATA_URL+'?t='+Date.now(),{cache:'no-store'});
      if(!resp.ok) throw new Error('http '+resp.status);
      const txt=await resp.text();
      DB=JSON.parse(txt);
      await idbSet('cache',txt); await idbSet('cache_time',new Date().toISOString());
      setStatus('online','🟢','güncel · '+fmtDate(new Date().toISOString()));
      loaded=true;
    }catch(e){
      // çevrimdışı: önbellekten
      try{
        const c=await idbGet('cache');
        if(c){ DB=JSON.parse(c); const t=await idbGet('cache_time'); offline=true; when=t; loaded=true;
          setStatus('offline','🟡 çevrimdışı — veri güncel olmayabilir · son: '+(t?fmtDate(t):'?')); }
      }catch(e2){}
    }
  }
  if(!loaded){
    setStatus('err','🔴 veri yüklenemedi');
    document.getElementById('boothint').innerHTML='Veri yüklenemedi. İlk kullanımda internet bağlantısı gerekir.<br><span style="font-size:13px">İnternete bağlanıp sayfayı yenileyin (F5).</span>';
    return;
  }
  V=DB.verses; S=DB.sureler;
  // Esmâ dizinini çek (çevrimdışı için önbellek)
  try{ const er=await fetch(ESMA_URL+'?t='+Date.now(),{cache:'no-store'});
    if(er.ok){ ESMA=JSON.parse(await er.text()); try{await idbSet('esma',JSON.stringify(ESMA));}catch(e){} } }
  catch(e){ try{ const c=await idbGet('esma'); if(c) ESMA=JSON.parse(c); }catch(e2){} }
  document.getElementById('boothint').className='';
  document.getElementById('main').className='scrollmode';
  document.getElementById('boothint').textContent='Soldan bir sûre seçin.';
  renderSidebar();
  document.getElementById('mobilgeri').onclick=listeyeDon;
  const sv=document.getElementById('surumet'); if(sv) sv.textContent='v'+SITE_SURUM;
  // sure sayfalarindan gelen baglantilar:  ?ayet=2.255  ya da  ?sure=2
  try{
    const up=new URLSearchParams(location.search);
    const pa=(up.get('ayet')||'').trim().replace(/\s/g,'').replace('.',':');
    const ps=(up.get('sure')||'').trim();
    if(/^\d{1,3}:\d{1,3}$/.test(pa) && V[pa]) openRef(pa);
    else if(/^\d{1,3}$/.test(ps) && S[ps]) selectSure(+ps);
  }catch(e){}
}

// ---- Sidebar ----
let sbMode='sure';
function renderSidebar(mode){
  mode=mode||'sure'; sbMode=mode;
  const sb=document.getElementById('sidebar'); sb.innerHTML='';

   Secili surenin altinda, yazilabilir + asagi acilan ayet numarasi kutusu.

const AYET_KUTUSU_ANALIZ = false;

function ayetKutusu(no){
  document.querySelectorAll('.ayetsec').forEach(x=>x.remove());
  document.querySelectorAll('.sure-cnt.gizli').forEach(x=>x.classList.remove('gizli'));
  const sat=document.querySelector('.sure-item.active');
  if(!sat || !S[no]) return;

  const box=el('<span class="ayetsec"><input type="text" inputmode="numeric" autocomplete="off" list="ayetliste"'+
    ' placeholder="'+n+'" title="\u00c2yet numaras\u0131 yaz\u0131n veya listeden se\u00e7in \u00b7 1\u2013'+n+'"><datalist id="ayetliste"></datalist></span>');
  let o=''; for(let i=1;i<=n;i++) o+='<option value="'+i+'">';
  box.querySelector('datalist').innerHTML=o;
  const inp=box.querySelector('input');
  const git=()=>{ const a=parseInt(inp.value,10);
                  inp.value='';
                  if(!a||a<1||a>n) return;
                  ayeteGit(no,a);
                  const y=document.querySelector('.ayetsec input'); if(y){ y.value=''; y.focus(); } };
  const listeAc=()=>{ try{ inp.showPicker(); }catch(e){} };
  inp.onmousedown=e=>e.stopPropagation();
  inp.onclick=e=>{ e.stopPropagation(); inp.select(); listeAc(); };
  inp.onfocus=()=>inp.select();

  inp.onkeydown=e=>{ if(e.key==='Enter'){ e.preventDefault(); git(); }
                     if(e.key==='Escape'){ inp.value=''; inp.blur(); } };
  sat.appendChild(box);

// --- arama normalizasyonu: Turkce/Ingilizce/Arapca + 2.3 gibi referans ---
let SIDX=null; const SKEL={};
const trKucuk=(x)=>(x||'').replace(/\u0130/g,'i').replace(/I/g,'\u0131').toLowerCase();
const trYalin=(x)=>trKucuk(x).replace(/[\u00e2]/g,'a').replace(/[\u00ee]/g,'i')
                             .replace(/[\u00fb]/g,'u').replace(/['\u2019\u2018\u0060]/g,'');
const arYalin=(x)=>(x||'').normalize('NFC')
  .replace(/[\u0610-\u061A\u064B-\u065F\u0670\u06D6-\u06ED\u0640]/g,'')
  .replace(/[\u0623\u0625\u0622\u0671]/g,'\u0627').replace(/\u0649/g,'\u064A').replace(/\u0629/g,'\u0647');
function aramaDizini(){
  if(SIDX) return SIDX;
  SIDX={};
  for(const ref in V){ const v=V[ref];
    SIDX[ref]=trYalin((v.mb||'')+' \n'+(v.me||'')+' \n'+((v.ko||[]).join(' ')))+' \n'+arYalin(v.ar||'');
    SKEL[ref]=arYalin(v.ar||'').replace(/\u0627/g,'');   // elifsiz iskelet (kitab/kitab imla farki)
  }
  return SIDX;
}
function runSearch(q){
  if(!V)return;
  const rq=q.trim().replace(/\s/g,'').replace('.',':');
  if(/^\d{1,3}:\d{1,3}$/.test(rq)){                 // 2.3 / 2:3 -> dogrudan o ayet
    if(V[rq]) return aramaSonuc(q,[rq]);
    return aramaSonuc(q,[]);
  }
  if(q.length<3){if(curSure)selectSure(curSure);return;}
  const idx=aramaDizini();
  const arapca=/[\u0600-\u06FF]/.test(q);
  const ara=arapca?arYalin(q):trYalin(q);
  if(!ara) return;
  // Mushaf imlasi: salat/zekat/hayat gibi kelimeler vav ile yazilir (\u0635\u0644\u0648\u0629).
  // Modern yazimla arananin da bulunmasi icin degiskeler denenir.
  const adaylar=[ara];
  if(arapca){
    if(ara.includes('\u0627\u0647')) adaylar.push(ara.replace(/\u0627\u0647/g,'\u0648\u0647'));
    if(ara.includes('\u0631\u0628\u0627')) adaylar.push(ara.replace(/\u0631\u0628\u0627/g,'\u0631\u0628\u0648\u0627'));
  }
  const bulunan=new Set();
  for(const ref in idx){
    if(adaylar.some(x=>idx[ref].includes(x))){ bulunan.add(ref); if(bulunan.size>=200)break; }
  }
  if(arapca && bulunan.size<200){                // elifsiz iskelet: kitab/kitab, insan/insan imla farki
    const isk=ara.replace(/\u0627/g,'');
    if(isk.length>=2) for(const ref in SKEL){ if(SKEL[ref].includes(isk)){ bulunan.add(ref); if(bulunan.size>=200)break; } }
  }
  const res=[...bulunan].sort((x,y)=>{const a1=x.split(':'),b1=y.split(':');return a1[0]-b1[0]||a1[1]-b1[1];});
  aramaSonuc(q,res);
}
let _gaT=null;
function aramaSonuc(q,res){
  icerigeGec();
  if(window.gtag){ clearTimeout(_gaT);           // her tusa degil, yazma bitince gonder
    _gaT=setTimeout(()=>gtag('event','arama',{terim:q.slice(0,60), sonuc:res.length}),2000); }                                     // cepte liste kapansin, sonuc gorunsun
  const m=document.getElementById('main'); m.className='';
  m.innerHTML=`<div class="searchhead">"${esc(q)}" için ${res.length}${res.length>=200?'+':''} sonuç</div>`;
  const list=el('<div></div>');
  res.forEach(ref=>{const v=V[ref];
    const r=el(`<div class="rel" data-ref="${ref}"><div class="ar">${esc(v.ar)}</div><div><span class="ref">${esc(v.sa)} ${v.a} (${gr(ref)})</span><div class="rm">${hi(esc(mealMode==='me'?v.me:v.mb),q)}</div></div></div>`);
    r.onclick=()=>goto(ref);list.appendChild(r);});
  m.appendChild(list);m.scrollTop=0;
}

function mdToHtml(md){
  const e=(x)=>x.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const inl=(x)=>e(x).replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>').replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>').replace(/\*([^*]+)\*/g,'<i>$1</i>');
  const lines=md.replace(/\r/g,'').split('\n'); let h='', inList=false;
  const cl=()=>{ if(inList){h+='</ul>'; inList=false;} };
  for(const raw of lines){ const t=raw.replace(/\s+$/,'');
    if(/^---+$/.test(t)){ cl(); h+='<hr>'; }
    else if(/^### /.test(t)){ cl(); h+='<h3>'+inl(t.slice(4))+'</h3>'; }
    else if(/^## /.test(t)){ cl(); h+='<h2>'+inl(t.slice(3))+'</h2>'; }
    else if(/^# /.test(t)){ cl(); h+='<h1>'+inl(t.slice(2))+'</h1>'; }
    else if(/^> /.test(t)){ cl(); h+='<blockquote>'+inl(t.slice(2))+'</blockquote>'; }
    else if(/^[-*] /.test(t)){ if(!inList){h+='<ul>';inList=true;} h+='<li>'+inl(t.slice(2))+'</li>'; }
    else if(t===''){ cl(); }
    else { cl(); h+='<p>'+inl(t)+'</p>'; }
  }
  cl(); return h;
}

let curEsma=null;
function showEsmaList(){
  curEsma=null; curSure=null;
  renderSidebar('esma');
  const m=document.getElementById('main'); m.className='';
  m.innerHTML=`<div class="hint"><div class="big">❈</div><span>Esmâ-i Hüsnâ — ${ESMA.esmalar.length} isim</span><br><span style="font-size:14px;color:var(--muted)">Soldan bir esmâ seçin.</span>
    <div class="tekdestek" style="max-width:420px;margin:26px auto 0;text-align:center">Teknik destek: M. Mustafa Murat</div></div>`;
  m.scrollTop=0;
}
function showEsma(name){
  icerigeGec();
  const info=ESMA.index[name]; if(!info)return;
  curEsma=name; markActiveSure(-1); curSure=null;
  const root=info.k||''; const i=ESMA.esmalar.indexOf(name), N=ESMA.esmalar.length;
  if(sbMode!=='esma') renderSidebar('esma');
  markActiveEsma(name);
  let rows='';
  info.r.forEach(rr=>{const w=V[rr]; if(!w)return;
    rows+=`<div class="esma-verse" data-ref="${rr}"><div class="ar">${hlArEsma(w,root)}</div>
      <div class="ev-ref">${esc(w.sa)} ${w.a} (${gr(rr)})</div>
      <div class="ev-meal">${showMeal(w,new Set())}</div></div>`;});
  const m=document.getElementById('main'); m.className='lockmode';
  m.innerHTML=`
    <div class="locktop">
      <div class="toolbar">
        <div class="navbtns">
          <div class="navbtn wide ${i<=0?'disabled':''}" title="Önceki esmâ" onclick="esmaAt(-1)">◄ Önceki</div>
          <div class="navbtn wide ${i>=N-1?'disabled':''}" title="Sonraki esmâ" onclick="esmaAt(1)">Sonraki ►</div>
        </div>
        <button class="btn ${mealMode==='mb'?'on':''}" onclick="setMealEsma('mb')">Türkçe (Ali Bulaç)</button>
        <button class="btn ${mealMode==='me'?'on':''}" onclick="setMealEsma('me')">İngilizce (Saheeh Int'l)</button>
        <button class="btn" onclick="window.print()" title="PDF kaydet">⤓ PDF</button>
      </div>
      <div class="esma-head"><span class="esma-ar-big">${esc(info.ar||'')}</span><span class="esma-baslik">${esc(name)}</span><span class="esma-say2">${info.n} âyet</span></div>
    </div>
    <div class="scrollbody">${rows}</div>`;
  m.querySelectorAll('.esma-verse').forEach(r=>r.onclick=()=>goto(r.dataset.ref));
  m.scrollTop=0;
}
function esmaAt(d){ const i=ESMA.esmalar.indexOf(curEsma), j=i+d; if(j>=0&&j<ESMA.esmalar.length) showEsma(ESMA.esmalar[j]); }
function setMealEsma(mm){ mealMode=mm; if(curEsma)showEsma(curEsma); }
boot();
</script>
<script>
/* ===== TAM EKRAN (F11 etkisi) =========================================
   OTO_TAM_EKRAN = true  -> sayfadaki ilk tiklama/tus basiminda kendiliginden
                            tam ekrana gecer (tarayicilar kullanici hareketi
                            olmadan tam ekrana izin vermiyor; "sayfa acilir
                            acilmaz" teknik olarak mumkun degil).
   OTO_TAM_EKRAN = false -> sadece basliktaki tam ekran dugmesiyle.
   Cikis: Esc tusu veya ayni dugme.
   ==================================================================== */
const OTO_TAM_EKRAN = true;

const tamMi = () => document.fullscreenElement || document.webkitFullscreenElement;

function tamEkran(){
  const de = document.documentElement;
  if (tamMi()){
    const f = document.exitFullscreen || document.webkitExitFullscreen;
    if (f) f.call(document);
  } else {
    const f = de.requestFullscreen || de.webkitRequestFullscreen;
    if (f){ const p = f.call(de); if (p && p.catch) p.catch(()=>{}); }
  }
}

function fsIkon(){
  const b = document.getElementById('fsbtn'); if(!b) return;
  const t = !!tamMi();
  b.textContent = t ? '\u2921' : '\u26F6';
  b.title = t ? 'Tam ekrandan \u00e7\u0131k (Esc)' : 'Tam ekran (F11 gibi)';
}
document.addEventListener('fullscreenchange', fsIkon);
document.addEventListener('webkitfullscreenchange', fsIkon);

if (OTO_TAM_EKRAN && !matchMedia('(max-width:760px)').matches){   // cepte tam ekrana gecilmez
  const ilk = () => {
    removeEventListener('click', ilk, true);
    removeEventListener('keyup', ilk, true);
    if (tamMi()) return;
    tamEkran();
    // gecis sirasinda takili kalan metin secimini temizle
    setTimeout(()=>{ try{ getSelection().removeAllRanges(); }catch(e){} }, 350);
  };
  // click/keyup = etkilesim BITTIKTEN sonra; pointerdown'da gecince
  // tarayici mouseup'i kaybediyor ve surukleme-secim kilitleniyor
  addEventListener('click', ilk, true);
  addEventListener('keyup', ilk, true);
}
</script>
